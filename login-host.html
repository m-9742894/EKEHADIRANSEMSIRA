<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Log Masuk Host</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
    </nav>

    <div class="container" style="max-width: 400px;">
        <button class="btn no-print" onclick="window.location.href='index.html'" style="margin-bottom: 20px;">
            <i class="fas fa-arrow-left"></i> Kembali
        </button>
        <div class="card">
            <h2 style="color: var(--danger);">Log Masuk Host</h2>
            <input type="email" id="login-host-email" placeholder="E-mel Host">
            <input type="password" id="login-host-pass" placeholder="Kata Laluan">
            <button class="btn btn-danger" style="width: 100%;" onclick="loginHost()">Masuk</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
