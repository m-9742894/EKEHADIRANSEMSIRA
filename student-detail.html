<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Detail Murid</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .nav-links a { color: var(--text-main); margin-left: 15px; text-decoration: none; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--primary); }
        button.btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        button.btn-warning { background: var(--warning); color: black; }
        .stat-card { text-align: center; padding: 15px; border-radius: 8px; }
        canvas { max-height: 250px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Kembali</a>
            <button class="btn btn-warning no-print" id="btn-edit" style="display:none;" onclick="bukaModal()">
                <i class="fas fa-edit"></i> Edit Kehadiran
            </button>
            <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak</button>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="border-top:4px solid var(--success);">
            <h2 id="nama-murid" style="color:var(--primary);"></h2>
            <p>No KP: <span id="ic-murid"></span> | Kelas Semasa: <span id="kelas-murid"></span></p>
            
            <div style="height:250px; margin:20px 0;">
                <canvas id="chartMurid"></canvas>
            </div>

            <div class="grid-3">
                <div class="stat-card" style="background:rgba(34,197,94,0.1); border:1px solid var(--success);">
                    <h4 style="color:var(--success);">Hadir</h4>
                    <div style="font-size:2rem; font-weight:bold;"><span id="count-hadir">0</span> Hari</div>
                </div>
                <div class="stat-card" style="background:rgba(245,158,11,0.1); border:1px solid var(--warning);">
                    <h4 style="color:var(--warning);">Lewat</h4>
                    <div style="font-size:2rem; font-weight:bold;"><span id="count-lewat">0</span> Hari</div>
                </div>
                <div class="stat-card" style="background:rgba(239,68,68,0.1); border:1px solid var(--danger);">
                    <h4 style="color:var(--danger);">Tidak Hadir</h4>
                    <div style="font-size:2rem; font-weight:bold;"><span id="count-takhadir">0</span> Hari</div>
                </div>
            </div>

            <h4 style="margin-top:20px;">Sejarah Kehadiran:</h4>
            <table>
                <thead>
                    <tr>
                        <th>Tarikh</th>
                        <th>Status</th>
                        <th>Masa</th>
                    </tr>
                </thead>
                <tbody id="table-kehadiran"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="modal-override" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
        <div class="card" style="width:90%; max-width:400px;">
            <h3 style="color:var(--warning);">Ubah Kehadiran</h3>
            <p id="modal-nama" style="font-weight:bold;"></p>
            <input type="hidden" id="modal-id">
            <label>Pilih Tarikh:</label>
            <input type="date" id="modal-tarikh">
            <label>Status:</label>
            <select id="modal-status">
                <option value="Hadir">Hadir</option>
                <option value="Lewat">Lewat</option>
                <option value="Tak Hadir">Tidak Hadir (Padam)</option>
            </select>
            <label>Masa:</label>
            <input type="time" id="modal-masa" value="07:30">
            <div style="margin-top:15px; text-align:right;">
                <button class="btn" onclick="tutupModal()">Batal</button>
                <button class="btn btn-warning" onclick="simpanEdit()">Simpan</button>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay { display: none; }
        .modal-overlay.show { display: flex; }
    </style>

    <script>
        let chart = null;
        let currentStudentId = null;

        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { murid: [], kelas: [], hariOperasi: 10 };
        }

        function saveDB(db) {
            localStorage.setItem('semsiraDB', JSON.stringify(db));
        }

        const getLocalSystemDate = () => {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        };

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentStudentId = parseInt(urlParams.get('id'));
            if (currentStudentId) {
                loadData();
                checkEditPermission();
            }
        });

        function loadData() {
            const db = getDB();
            const murid = db.murid.find(m => m.id === currentStudentId);
            if (!murid) return;

            const kelas = db.kelas.find(k => k.id === murid.kelasId);

            document.getElementById('nama-murid').innerText = murid.nama;
            document.getElementById('ic-murid').innerText = murid.ic;
            document.getElementById('kelas-murid').innerText = kelas ? kelas.name : '-';

            // Kira statistik
            let hadir = 0, lewat = 0;
            murid.kehadiran.forEach(r => {
                if (r.status === 'Lewat') lewat++;
                else hadir++;
            });
            let takhadir = db.hariOperasi - (hadir + lewat);
            if (takhadir < 0) takhadir = 0;

            document.getElementById('count-hadir').innerText = hadir;
            document.getElementById('count-lewat').innerText = lewat;
            document.getElementById('count-takhadir').innerText = takhadir;

            // Chart
            const ctx = document.getElementById('chartMurid').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Hadir', 'Lewat', 'Tak Hadir'],
                    datasets: [{
                        data: [hadir, lewat, takhadir],
                        backgroundColor: ['#22c55e', '#f59e0b', '#ef4444']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });

            // Sejarah kehadiran
            const tbody = document.getElementById('table-kehadiran');
            tbody.innerHTML = '';
            const rekodSorted = [...murid.kehadiran].sort((a,b) => new Date(b.tarikh) - new Date(a.tarikh));
            rekodSorted.forEach(r => {
                const warna = r.status === 'Lewat' ? 'var(--warning)' : 'var(--success)';
                tbody.innerHTML += `
                    <tr>
                        <td>${r.tarikh}</td>
                        <td style="color:${warna}; font-weight:bold;">${r.status}</td>
                        <td>${r.masa}</td>
                    </tr>
                `;
            });
        }

        function checkEditPermission() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                const db = getDB();
                const murid = db.murid.find(m => m.id === currentStudentId);
                const kelas = db.kelas.find(k => k.id === murid?.kelasId);
                
                // Host atau guru kelas boleh edit
                if (user.role === 'host' || (kelas && user.id === kelas.guruId)) {
                    document.getElementById('btn-edit').style.display = 'inline-block';
                }
            }
        }

        function bukaModal() {
            const db = getDB();
            const murid = db.murid.find(m => m.id === currentStudentId);
            document.getElementById('modal-nama').innerText = murid.nama;
            document.getElementById('modal-id').value = currentStudentId;
            document.getElementById('modal-tarikh').value = getLocalSystemDate();
            document.getElementById('modal-masa').value = '07:30';
            document.getElementById('modal-override').style.display = 'flex';
        }

        function tutupModal() {
            document.getElementById('modal-override').style.display = 'none';
        }

        function simpanEdit() {
            const id = parseInt(document.getElementById('modal-id').value);
            const tarikh = document.getElementById('modal-tarikh').value;
            const status = document.getElementById('modal-status').value;
            const masa = document.getElementById('modal-masa').value + ':00';

            const db = getDB();
            const murid = db.murid.find(m => m.id === id);
            if (!murid) return;

            const index = murid.kehadiran.findIndex(r => r.tarikh === tarikh);

            if (status === 'Tak Hadir') {
                if (index > -1) murid.kehadiran.splice(index, 1);
            } else {
                if (index > -1) {
                    murid.kehadiran[index].status = status;
                    murid.kehadiran[index].masa = masa;
                } else {
                    murid.kehadiran.push({ tarikh: tarikh, status: status, masa: masa });
                }
            }

            saveDB(db);
            alert('Status kehadiran disunting!');
            tutupModal();
            loadData();
        }
    </script>
</body>
</html>
