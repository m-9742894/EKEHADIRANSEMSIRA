<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM KEHADIRAN MURID SEMSIRA - Imbasan RFID</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        .hidden { display: none !important; }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        button.btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.btn:hover { background: #0284c7; }
        button.btn-success { background: var(--success); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
    </nav>

    <div class="container">
        <button class="btn no-print" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Kembali
        </button>
        <div class="card" style="text-align: center; padding: 50px 20px;">
            <i id="scan-buka-icon" class="fas fa-wifi" style="font-size: 5rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 id="scan-title">SILA IMBAS KAD RFID</h2>
            <p id="scan-sub" style="color: var(--text-muted); margin-bottom: 20px;">Pastikan masa komputer selari dengan Waktu Malaysia.</p>
            <input type="text" id="rfid-listener" style="width: 50%; max-width: 400px; text-align: center; font-size: 1.5rem; border: 2px solid var(--primary);" placeholder="UID RFID" onkeydown="handleScanInput(event)" autocomplete="off">
            <div id="scan-tutup-msg" class="hidden"></div>
            <div id="scan-result" class="hidden" style="margin-top: 20px; padding: 20px; background: #0f172a; border-radius: 10px;">
                <h2 id="scan-name" style="color:var(--primary);"></h2>
                <p id="scan-status-text" style="font-weight:bold; font-size:1.5rem; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script>
        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { cuti: [], murid: [], tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' } };
        }

        function saveDB(db) {
            localStorage.setItem('semsiraDB', JSON.stringify(db));
        }

        const getLocalSystemDate = () => { 
            const now = new Date(); 
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 
        };

        const getLocalSystemTime = () => { 
            const now = new Date(); 
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`; 
        };

        document.addEventListener('DOMContentLoaded', function() {
            const db = getDB();
            const today = getLocalSystemDate();
            const cutiHariIni = db.cuti.find(c => c.tarikh === today);
            const rfidInput = document.getElementById('rfid-listener');
            const scanBukaIcon = document.getElementById('scan-buka-icon');
            const scanTitle = document.getElementById('scan-title');
            const scanSub = document.getElementById('scan-sub');
            const scanResult = document.getElementById('scan-result');
            const scanTutupMsg = document.getElementById('scan-tutup-msg');
            
            if(cutiHariIni) { 
                if (rfidInput) rfidInput.classList.add('hidden'); 
                if (scanBukaIcon) scanBukaIcon.classList.add('hidden'); 
                if (scanTitle) scanTitle.classList.add('hidden'); 
                if (scanResult) scanResult.classList.add('hidden'); 
                if (scanSub) scanSub.classList.add('hidden'); 
                
                if (scanTutupMsg) {
                    scanTutupMsg.innerHTML = `
                        <i class="fas fa-calendar-times" style="font-size: 5rem; color: var(--danger); margin-bottom: 20px;"></i>
                        <h2 style="color: var(--danger);">MAAF, RFID DITUTUP</h2>
                        <h3 style="margin-top:10px; color: var(--warning);">BAGI CUTI: ${cutiHariIni.nama.toUpperCase()}</h3>
                    `; 
                    scanTutupMsg.classList.remove('hidden'); 
                }
            } else { 
                if (rfidInput) {
                    rfidInput.classList.remove('hidden'); 
                    setTimeout(() => rfidInput.focus(), 100); 
                }
                if (scanBukaIcon) scanBukaIcon.classList.remove('hidden'); 
                if (scanTitle) scanTitle.classList.remove('hidden'); 
                if (scanSub) scanSub.classList.remove('hidden'); 
                if (scanTutupMsg) scanTutupMsg.classList.add('hidden'); 
            } 
        });

        function handleScanInput(e) { 
            if(e.key === 'Enter' && e.target.value.trim()){ 
                processRFID(e.target.value); 
            } 
        }

        function processRFID(uid) { 
            const db = getDB();
            const today = getLocalSystemDate(); 
            const rfidInput = document.getElementById('rfid-listener'); 
            
            if(db.cuti.find(c => c.tarikh === today)) { 
                alert("Sistem ditutup untuk hari cuti."); 
                if (rfidInput) {
                    rfidInput.value = ''; 
                    rfidInput.focus(); 
                }
                return; 
            } 
            
            const now = new Date(); 
            const currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            
            if (currentTime < db.tetapanWaktu.buka) {
                alert("Sistem kehadiran belum dibuka. Waktu buka: " + db.tetapanWaktu.buka);
                if (rfidInput) {
                    rfidInput.value = ''; 
                    rfidInput.focus(); 
                }
                return;
            }

            if (currentTime > db.tetapanWaktu.tutup) {
                alert("Sistem kehadiran telah ditutup pada: " + db.tetapanWaktu.tutup);
                if (rfidInput) {
                    rfidInput.value = ''; 
                    rfidInput.focus(); 
                }
                return;
            }

            let stat = (currentTime > db.tetapanWaktu.lewat) ? 'Lewat' : 'Hadir';

            if (rfidInput) {
                rfidInput.value = ''; 
                setTimeout(() => rfidInput.focus(), 50); 
            }
            
            const cleanUID = uid.trim().toUpperCase(); 
            const murid = db.murid.find(x => x.uid.toUpperCase() === cleanUID); 
            
            if(murid) { 
                let attendance = murid.kehadiran.find(x => x.tarikh === today); 
                if(!attendance) { 
                    murid.kehadiran.push({tarikh: today, status: stat, masa: getLocalSystemTime()}); 
                    saveDB(db);
                } else { 
                    stat = attendance.status;
                } 
                
                const scanName = document.getElementById('scan-name');
                const scanStatus = document.getElementById('scan-status-text');
                const scanResult = document.getElementById('scan-result');
                
                if (scanName) scanName.innerText = murid.nama; 
                if (scanStatus) {
                    scanStatus.innerText = stat; 
                    scanStatus.style.color = stat === 'Lewat' ? 'var(--warning)' : 'var(--success)'; 
                }
                if (scanResult) {
                    scanResult.classList.remove('hidden'); 
                    setTimeout(() => scanResult.classList.add('hidden'), 3000); 
                }
            } else { 
                alert("Kad Tidak Dikenali! Sila daftarkan UID kad ini terlebih dahulu."); 
            } 
        }
    </script>
</body>
</html>
