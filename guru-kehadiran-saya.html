<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Guru: Kehadiran Kelas Saya</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0f172a; 
            --panel-bg: #1e293b; 
            --primary: #0ea5e9; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        .hidden { 
            display: none !important; 
        }
        nav { 
            background-color: var(--panel-bg); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            flex-wrap: wrap; 
            gap: 10px;
        }
        .nav-brand { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--primary); 
            letter-spacing: 1px; 
        }
        .nav-links a { 
            color: var(--text-main); 
            margin-left: 15px; 
            text-decoration: none; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links a:hover { 
            color: var(--primary); 
        }
        .nav-links button { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            margin-left: 15px; 
            cursor: pointer; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links button:hover { 
            color: var(--primary); 
        }
        .container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }
        .card { 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
        }
        .sub-card { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            margin-bottom: 15px; 
        }
        button.btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button.btn:hover { 
            background: #0284c7; 
        }
        button.btn-success { 
            background: var(--success); 
        }
        button.btn-success:hover { 
            background: #16a34a; 
        }
        button.btn-warning { 
            background: var(--warning); 
            color: #000; 
        }
        button.btn-warning:hover { 
            background: #d97706; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem; 
        }
        .inline-input { 
            width: auto; 
            display: inline-block; 
            margin-right: 10px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { 
            color: var(--primary); 
            font-weight: 600;
        }
        .clickable-text { 
            color: var(--primary); 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: bold; 
        }
        .clickable-text:hover { 
            color: var(--success); 
        }
        .status-hadir { color: var(--success); font-weight: bold; }
        .status-lewat { color: var(--warning); font-weight: bold; }
        .status-takhadir { color: var(--danger); font-weight: bold; }
        
        /* Modal Styles */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal-card { 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            width: 90%; 
            max-width: 400px; 
            border: 2px solid var(--warning); 
        }
        @media print {
            nav, .btn, .no-print, input[type="date"], input.no-print { 
                display: none !important; 
            }
            body { 
                background: white; 
                color: black; 
            }
            .card, .sub-card { 
                background: none; 
                box-shadow: none; 
                border: 1px solid #ccc; 
                color: black; 
            }
            th, td, p, h2, h3, h4, span { 
                color: black !important; 
                border-color: #ccc; 
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="dashboard-guru.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fas fa-user-check"></i> Kehadiran Kelas Saya</h2>
                <div class="no-print">
                    <input type="date" id="tarikh-pilih" class="inline-input" style="width: 200px;" onchange="renderKehadiran()">
                </div>
            </div>

            <!-- Container for class attendance tables -->
            <div id="kelas-container"></div>
        </div>
    </div>

    <!-- Modal Override -->
    <div id="modal-override" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 style="color: var(--warning); margin-bottom: 15px;">Ubah Kehadiran</h3>
            <p id="ovr-nama" style="font-weight: bold; margin-bottom: 10px;"></p>
            <input type="hidden" id="ovr-id">
            
            <label>Pilih Tarikh:</label>
            <input type="date" id="ovr-date">
            
            <label>Status:</label>
            <select id="ovr-status">
                <option value="Hadir">Hadir</option>
                <option value="Lewat">Lewat</option>
                <option value="Tak Hadir">Tidak Hadir (Padam Rekod)</option>
            </select>
            
            <label>Masa (Optional):</label>
            <input type="time" id="ovr-time" value="07:30">
            
            <div style="margin-top: 20px; text-align: right;">
                <button class="btn" onclick="tutupModal()">Batal</button>
                <button class="btn btn-warning" onclick="simpanOverride()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // Current user
        let currentUser = null;

        // Utility Functions
        const getLocalSystemDate = () => { 
            const now = new Date(); 
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 
        };

        const getLocalSystemTime = () => { 
            const now = new Date(); 
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`; 
        };

        // Database functions
        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { 
                gurus: [], 
                kelas: [], 
                murid: [], 
                hariOperasi: 10,
                cuti: [],
                tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' }
            };
        }

        function saveDB(db) {
            localStorage.setItem('semsiraDB', JSON.stringify(db));
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check login
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                if (currentUser.role === 'host') {
                    window.location.href = 'login-guru.html';
                    return;
                }
            } else {
                window.location.href = 'login-guru.html';
                return;
            }
            
            // Set default date
            document.getElementById('tarikh-pilih').value = getLocalSystemDate();
            
            // Render attendance
            renderKehadiran();
        });

        // Main render function
        function renderKehadiran() {
            const db = getDB();
            const tarikh = document.getElementById('tarikh-pilih').value || getLocalSystemDate();
            const container = document.getElementById('kelas-container');
            
            container.innerHTML = '';

            // Get classes taught by current teacher
            const kelasGuru = db.kelas.filter(k => k.guruId === currentUser.id);

            if (kelasGuru.length === 0) {
                container.innerHTML = '<div class="sub-card"><p style="color: var(--warning); text-align: center;">Anda tidak mempunyai sebarang kelas.</p></div>';
                return;
            }

            // Generate table for each class
            kelasGuru.forEach(k => {
                const muridKelas = db.murid.filter(m => m.kelasId === k.id);
                
                let html = `
                    <div class="sub-card">
                        <h3 style="color: var(--primary); margin-bottom: 15px;">${k.name}</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Nama Murid</th>
                                    <th>No KP</th>
                                    <th>Status Kehadiran</th>
                                    <th class="no-print">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                if (muridKelas.length === 0) {
                    html += '<tr><td colspan="4" style="text-align: center;">Tiada murid dalam kelas ini.</td></tr>';
                } else {
                    muridKelas.forEach(m => {
                        const rekod = m.kehadiran.find(r => r.tarikh === tarikh);
                        let statusText = rekod ? rekod.status : 'Belum Hadir';
                        let statusClass = '';
                        
                        if (rekod) {
                            if (rekod.status === 'Hadir') statusClass = 'status-hadir';
                            else if (rekod.status === 'Lewat') statusClass = 'status-lewat';
                        } else {
                            statusClass = 'status-takhadir';
                        }

                        html += `
                            <tr>
                                <td><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></td>
                                <td>${m.ic}</td>
                                <td class="${statusClass}">${statusText}</td>
                                <td class="no-print">
                                    <button class="btn btn-warning" style="font-size: 0.8rem;" onclick="bukaOverride(${m.id}, '${m.nama}')">
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }

                html += '</tbody></table></div>';
                container.innerHTML += html;
            });
        }

        // Modal functions
        function bukaOverride(mId, mNama) {
            document.getElementById('ovr-id').value = mId;
            document.getElementById('ovr-nama').innerText = mNama;
            document.getElementById('ovr-date').value = getLocalSystemDate();
            document.getElementById('ovr-time').value = '07:30';
            document.getElementById('modal-override').classList.remove('hidden');
        }

        function tutupModal() {
            document.getElementById('modal-override').classList.add('hidden');
        }

        function simpanOverride() {
            const id = parseInt(document.getElementById('ovr-id').value);
            const tarikh = document.getElementById('ovr-date').value;
            const status = document.getElementById('ovr-status').value;
            const masa = document.getElementById('ovr-time').value + ':00';

            const db = getDB();
            const murid = db.murid.find(m => m.id === id);
            
            if (!murid) {
                alert('Ralat: Murid tidak dijumpai');
                tutupModal();
                return;
            }

            const index = murid.kehadiran.findIndex(r => r.tarikh === tarikh);

            if (status === 'Tak Hadir') {
                if (index > -1) {
                    murid.kehadiran.splice(index, 1);
                }
            } else {
                if (index > -1) {
                    murid.kehadiran[index].status = status;
                    murid.kehadiran[index].masa = masa;
                } else {
                    murid.kehadiran.push({
                        tarikh: tarikh,
                        status: status,
                        masa: masa
                    });
                }
            }

            saveDB(db);
            alert('Status kehadiran berjaya dikemaskini!');
            tutupModal();
            renderKehadiran(); // Refresh the display
        }
    </script>
</body>
</html>
