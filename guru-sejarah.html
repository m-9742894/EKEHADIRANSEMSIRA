<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">

    <title>SEMSIRA - Guru: Sejarah Kehadiran</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0f172a; 
            --panel-bg: #1e293b; 
            --primary: #0ea5e9; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        .hidden { 
            display: none !important; 
        }
        nav { 
            background-color: var(--panel-bg); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            flex-wrap: wrap; 
            gap: 10px;
        }
        .nav-brand { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--primary); 
            letter-spacing: 1px; 
        }
        .nav-links a { 
            color: var(--text-main); 
            margin-left: 15px; 
            text-decoration: none; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links a:hover { 
            color: var(--primary); 
        }
        .nav-links button { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            margin-left: 15px; 
            cursor: pointer; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links button:hover { 
            color: var(--primary); 
        }
        .container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }
        .card { 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
        }
        .sub-card { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            margin-bottom: 15px; 
        }
        button.btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button.btn:hover { 
            background: #0284c7; 
        }
        button.btn-success { 
            background: var(--success); 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem; 
        }
        .grid-3 { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { 
            color: var(--primary); 
            font-weight: 600;
        }
        .clickable-text { 
            color: var(--primary); 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: bold; 
        }
        .clickable-text:hover { 
            color: var(--success); 
        }
        .text-success { color: var(--success); font-weight: bold; }
        .text-warning { color: var(--warning); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
        
        @media print {
            nav, .btn, .no-print, input[type="date"], input.no-print, select { 
                display: none !important; 
            }
            body { 
                background: white; 
                color: black; 
            }
            .card, .sub-card { 
                background: none; 
                box-shadow: none; 
                border: 1px solid #ccc; 
                color: black; 
            }
            th, td, p, h2, h3, h4, span { 
                color: black !important; 
                border-color: #ccc; 
            }
            .text-success, .text-warning, .text-danger { 
                color: black !important; 
                font-weight: bold; 
            }
        }
    </style>
</head>
