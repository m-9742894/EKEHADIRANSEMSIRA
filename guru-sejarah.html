<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Guru: Sejarah Kehadiran</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0f172a; 
            --panel-bg: #1e293b; 
            --primary: #0ea5e9; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        .hidden { 
            display: none !important; 
        }
        nav { 
            background-color: var(--panel-bg); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            flex-wrap: wrap; 
            gap: 10px;
        }
        .nav-brand { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--primary); 
            letter-spacing: 1px; 
        }
        .nav-links a { 
            color: var(--text-main); 
            margin-left: 15px; 
            text-decoration: none; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links a:hover { 
            color: var(--primary); 
        }
        .nav-links button { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            margin-left: 15px; 
            cursor: pointer; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links button:hover { 
            color: var(--primary); 
        }
        .container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }
        .card { 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
        }
        .sub-card { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            margin-bottom: 15px; 
        }
        button.btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button.btn:hover { 
            background: #0284c7; 
        }
        button.btn-success { 
            background: var(--success); 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem; 
        }
        .grid-3 { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { 
            color: var(--primary); 
            font-weight: 600;
        }
        .clickable-text { 
            color: var(--primary); 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: bold; 
        }
        .clickable-text:hover { 
            color: var(--success); 
        }
        .text-success { color: var(--success); font-weight: bold; }
        .text-warning { color: var(--warning); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
        
        @media print {
            nav, .btn, .no-print, input[type="date"], input.no-print, select { 
                display: none !important; 
            }
            body { 
                background: white; 
                color: black; 
            }
            .card, .sub-card { 
                background: none; 
                box-shadow: none; 
                border: 1px solid #ccc; 
                color: black; 
            }
            th, td, p, h2, h3, h4, span { 
                color: black !important; 
                border-color: #ccc; 
            }
            .text-success, .text-warning, .text-danger { 
                color: black !important; 
                font-weight: bold; 
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="dashboard-guru.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak Laporan</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Sejarah Keseluruhan Murid</h2>
            
            <!-- Filter Section -->
            <div class="grid-3 no-print" style="background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <div>
                    <label><i class="fas fa-calendar"></i> Pilih Tahun:</label>
                    <select id="pilih-tahun" onchange="paparSejarah()"></select>
                </div>
                <div>
                    <label><i class="fas fa-chalkboard"></i> Pilih Kelas:</label>
                    <select id="pilih-kelas" onchange="paparSejarah()"></select>
                </div>
                <div>
                    <label><i class="fas fa-calendar-day"></i> Tarikh Spesifik (Pilihan):</label>
                    <input type="date" id="tarikh-spesifik" onchange="paparSejarah()">
                </div>
            </div>

            <!-- History Table -->
            <div style="overflow-x: auto;">
                <table id="sejarah-table">
                    <thead>
                        <tr>
                            <th>Nama Murid</th>
                            <th>No KP</th>
                            <th class="text-success">Hadir</th>
                            <th class="text-warning">Lewat</th>
                            <th class="text-danger">Tidak Hadir</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--warning);">
                                Sila pilih tahun dan kelas untuk melihat sejarah
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Utility Functions
        const getCurrentYear = () => new Date().getFullYear().toString();

        // Database functions
        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { 
                gurus: [], 
                kelas: [], 
                murid: [], 
                hariOperasi: 10,
                cuti: [],
                tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' }
            };
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check login
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'login-guru.html';
                return;
            }

            // Populate dropdowns
            populateDropdowns();
        });

        // Populate year and class dropdowns
        function populateDropdowns() {
            const db = getDB();
            const tahunEl = document.getElementById('pilih-tahun');
            const kelasEl = document.getElementById('pilih-kelas');

            // Get unique years from student history
            const tahunSet = new Set();
            db.murid.forEach(m => {
                if (m.sejarahKelas && m.sejarahKelas.length > 0) {
                    m.sejarahKelas.forEach(sk => tahunSet.add(sk.tahun));
                } else {
                    tahunSet.add(getCurrentYear());
                }
            });

            // Add current year if not present
            tahunSet.add(getCurrentYear());

            // Sort years descending
            const tahunArray = Array.from(tahunSet).sort().reverse();

            // Populate year dropdown
            tahunEl.innerHTML = '';
            tahunArray.forEach(t => {
                tahunEl.innerHTML += `<option value="${t}">${t}</option>`;
            });

            // Populate class dropdown
            kelasEl.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            db.kelas.forEach(k => {
                kelasEl.innerHTML += `<option value="${k.id}">${k.name}</option>`;
            });

            // Trigger initial search if class is preselected
            if (kelasEl.value) {
                paparSejarah();
            }
        }

        // Main function to display history
        function paparSejarah() {
            const db = getDB();
            const tahun = document.getElementById('pilih-tahun').value;
            const kelasId = document.getElementById('pilih-kelas').value;
            const tarikhSpesifik = document.getElementById('tarikh-spesifik').value;
            const tbody = document.getElementById('table-body');

            // Clear table
            tbody.innerHTML = '';

            // Validation
            if (!kelasId) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--warning);">Sila pilih kelas untuk melihat sejarah</td></tr>';
                return;
            }

            // Find students in this class for the selected year
            let muridKelas = [];
            
            db.murid.forEach(m => {
                let dalamKelasIni = false;
                
                // Check if student was in this class during selected year
                if (m.sejarahKelas && m.sejarahKelas.length > 0) {
                    const rekodSejarah = m.sejarahKelas.find(sk => sk.tahun === tahun);
                    if (rekodSejarah && rekodSejarah.kelasId === parseInt(kelasId)) {
                        dalamKelasIni = true;
                    }
                } else {
                    // If no sejarahKelas data, assume current year
                    if (tahun === getCurrentYear() && m.kelasId === parseInt(kelasId)) {
                        dalamKelasIni = true;
                    }
                }
                
                if (dalamKelasIni) {
                    muridKelas.push(m);
                }
            });

            if (muridKelas.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">Tiada rekod murid untuk kelas ini pada tahun ${tahun}</td></tr>`;
                return;
            }

            // Display based on specific date or yearly summary
            if (tarikhSpesifik) {
                // Check if selected date is within the year
                if (!tarikhSpesifik.startsWith(tahun)) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger);">Tarikh yang dipilih berada di luar tahun ${tahun}</td></tr>`;
                    return;
                }

                // Show attendance for specific date
                muridKelas.forEach(m => {
                    const rekod = m.kehadiran.find(r => r.tarikh === tarikhSpesifik);
                    const hadir = rekod && rekod.status === 'Hadir' ? 1 : 0;
                    const lewat = rekod && rekod.status === 'Lewat' ? 1 : 0;
                    const takhadir = !rekod ? 1 : 0;

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></td>
                            <td>${m.ic}</td>
                            <td class="text-success">${hadir}</td>
                            <td class="text-warning">${lewat}</td>
                            <td class="text-danger">${takhadir}</td>
                        </tr>
                    `;
                });
            } else {
                // Show yearly summary
                muridKelas.forEach(m => {
                    let hadir = 0, lewat = 0;
                    
                    // Count attendance for the selected year
                    m.kehadiran.forEach(r => {
                        if (r.tarikh.startsWith(tahun)) {
                            if (r.status === 'Lewat') {
                                lewat++;
                            } else {
                                hadir++;
                            }
                        }
                    });
                    
                    // Calculate absent days
                    let takhadir = db.hariOperasi - (hadir + lewat);
                    if (takhadir < 0) takhadir = 0;

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></td>
                            <td>${m.ic}</td>
                            <td class="text-success">${hadir} Hari</td>
                            <td class="text-warning">${lewat} Hari</td>
                            <td class="text-danger">${takhadir} Hari</td>
                        </tr>
                    `;
                });
            }
        }

        // Expose function globally
        window.paparSejarah = paparSejarah;
    </script>
</body>
</html>
