<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Guru: Statistik Keseluruhan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0f172a; 
            --panel-bg: #1e293b; 
            --primary: #0ea5e9; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        .hidden { 
            display: none !important; 
        }
        nav { 
            background-color: var(--panel-bg); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--primary); 
            flex-wrap: wrap; 
            gap: 10px;
        }
        .nav-brand { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--primary); 
            letter-spacing: 1px; 
        }
        .nav-links a { 
            color: var(--text-main); 
            margin-left: 15px; 
            text-decoration: none; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links a:hover { 
            color: var(--primary); 
        }
        .nav-links button { 
            background: none; 
            border: none; 
            color: var(--text-main); 
            margin-left: 15px; 
            cursor: pointer; 
            font-size: 1rem; 
            padding: 5px; 
        }
        .nav-links button:hover { 
            color: var(--primary); 
        }
        .container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }
        .card { 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
        }
        .sub-card { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            margin-bottom: 15px; 
        }
        button.btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        button.btn:hover { 
            background: #0284c7; 
        }
        button.btn-success { 
            background: var(--success); 
        }
        button.btn-success:hover { 
            background: #16a34a; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            font-size: 1rem; 
        }
        .inline-input { 
            width: auto; 
            display: inline-block; 
            margin-right: 10px; 
        }
        .grid-3 { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
        }
        th, td { 
            padding: 10px; 
            text-align: left; 
            border-bottom: 1px solid #334155; 
        }
        th { 
            color: var(--primary); 
        }
        .clickable-text { 
            color: var(--primary); 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: bold; 
        }
        .clickable-text:hover { 
            color: var(--success); 
        }
        ul { 
            list-style: none; 
            padding-left: 0; 
        }
        li { 
            padding: 5px 0; 
            border-bottom: 1px solid #334155; 
        }
        canvas { 
            max-height: 300px; 
            width: 100%; 
        }
        @media print {
            nav, .btn, .no-print, input[type="date"], input.no-print { 
                display: none !important; 
            }
            body { 
                background: white; 
                color: black; 
            }
            .card, .sub-card { 
                background: none; 
                box-shadow: none; 
                border: 1px solid #ccc; 
                color: black; 
            }
            th, td, p, h2, h3, h4, span { 
                color: black !important; 
                border-color: #ccc; 
            }
            canvas { 
                max-height: 300px; 
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="dashboard-guru.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fas fa-chart-pie"></i> Statistik Keseluruhan</h2>
                <div class="no-print">
                    <input type="date" id="tarikh-pilih" class="inline-input" style="width: 200px;" onchange="renderStatistik()">
                </div>
            </div>

            <!-- Chart -->
            <div style="height: 300px; margin: 20px 0;">
                <canvas id="chartKeseluruhan"></canvas>
            </div>

            <!-- Senarai mengikut status -->
            <div class="grid-3">
                <div class="sub-card">
                    <h4 style="color: var(--success);"><i class="fas fa-check-circle"></i> Hadir</h4>
                    <ul id="list-hadir" style="margin-top: 10px;"></ul>
                </div>
                <div class="sub-card">
                    <h4 style="color: var(--warning);"><i class="fas fa-clock"></i> Lewat</h4>
                    <ul id="list-lewat" style="margin-top: 10px;"></ul>
                </div>
                <div class="sub-card">
                    <h4 style="color: var(--danger);"><i class="fas fa-times-circle"></i> Tidak Hadir</h4>
                    <ul id="list-takhadir" style="margin-top: 10px;"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chart instance
        let chartKeseluruhan = null;

        // Utility Functions
        const getLocalSystemDate = () => { 
            const now = new Date(); 
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 
        };

        // Database functions
        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { 
                gurus: [], 
                kelas: [], 
                murid: [], 
                hariOperasi: 10,
                cuti: [],
                tetapanWaktu: { buka: '06:30', lewat: '07:30', tutup: '14:00' }
            };
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Set default date
            document.getElementById('tarikh-pilih').value = getLocalSystemDate();
            
            // Check login
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'login-guru.html';
                return;
            }
            
            // Render statistics
            renderStatistik();
        });

        // Main render function
        function renderStatistik() {
            const db = getDB();
            const tarikh = document.getElementById('tarikh-pilih').value || getLocalSystemDate();
            
            // Initialize counters and lists
            let hadir = 0, lewat = 0, takhadir = 0;
            let listHadir = [], listLewat = [], listTakhadir = [];

            // Process each student
            db.murid.forEach(m => {
                const rekod = m.kehadiran.find(r => r.tarikh === tarikh);
                
                if (rekod) {
                    if (rekod.status === 'Lewat') {
                        lewat++;
                        listLewat.push(`<li><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></li>`);
                    } else {
                        hadir++;
                        listHadir.push(`<li><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></li>`);
                    }
                } else {
                    takhadir++;
                    listTakhadir.push(`<li><span class="clickable-text" onclick="window.location.href='student-detail.html?id=${m.id}'">${m.nama}</span></li>`);
                }
            });

            // Update chart
            updateChart(hadir, lewat, takhadir);

            // Update lists
            document.getElementById('list-hadir').innerHTML = listHadir.length ? listHadir.join('') : '<li style="color: var(--text-muted);">Tiada rekod hadir</li>';
            document.getElementById('list-lewat').innerHTML = listLewat.length ? listLewat.join('') : '<li style="color: var(--text-muted);">Tiada rekod lewat</li>';
            document.getElementById('list-takhadir').innerHTML = listTakhadir.length ? listTakhadir.join('') : '<li style="color: var(--text-muted);">Tiada rekod tidak hadir</li>';
        }

        // Update chart function
        function updateChart(hadir, lewat, takhadir) {
            const ctx = document.getElementById('chartKeseluruhan').getContext('2d');
            
            // Destroy existing chart if it exists
            if (chartKeseluruhan) {
                chartKeseluruhan.destroy();
            }

            // Create new chart
            chartKeseluruhan = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Hadir', 'Lewat', 'Tidak Hadir'],
                    datasets: [{
                        data: [hadir, lewat, takhadir],
                        backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.raw} orang`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                                color: '#fff'
                            },
                            grid: {
                                color: '#334155'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#fff'
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
