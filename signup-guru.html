<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM KEHADIRAN MURID SEMSIRA - Daftar Guru</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        button.btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        button.btn:hover { background: #0284c7; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
    </nav>

    <div class="container" style="max-width: 400px;">
        <button class="btn" onclick="window.location.href='index.html'" style="margin-bottom: 20px; width: auto;">
            <i class="fas fa-arrow-left"></i> Kembali
        </button>
        <div class="card">
            <h2>Daftar Guru Baru</h2>
            <input type="text" id="reg-name" placeholder="Nama Penuh">
            <input type="text" id="reg-phone" placeholder="Nombor Telefon">
            <input type="email" id="reg-email" placeholder="Alamat E-mel">
            <input type="password" id="reg-pass" placeholder="Kata Laluan">
            <button class="btn" onclick="registerGuru()">Daftar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        // 必须导入 database 模块
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxZIDIPRhwXT_1aeS-dKsG2kmuUyJLUlQ",
            authDomain: "semsirakehadiran.firebaseapp.com",
            projectId: "semsirakehadiran",
            storageBucket: "semsirakehadiran.firebasestorage.app",
            messagingSenderId: "68504541700",
            appId: "1:68504541700:web:26939e18ed7ae32fe57351",
            measurementId: "G-QE4862H49Z"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 将函数暴露给全局，让 HTML 上的 onclick 能找到它
        window.registerGuru = function() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if (name && email && pass) {
                // 构造数据
                const newGuru = {
                    id: Date.now(),
                    name: name,
                    phone: phone,
                    email: email,
                    pass: pass
                };

                // 1. 同步到本地 (保持你的离线功能)
                const saved = localStorage.getItem('semsiraDB');
                let localDB = saved ? JSON.parse(saved) : { gurus: [] };
                if(!localDB.gurus) localDB.gurus = [];
                localDB.gurus.push(newGuru);
                localStorage.setItem('semsiraDB', JSON.stringify(localDB));

                // 2. 同步到 Firebase (云端功能)
                const gurusRef = ref(db, 'gurus');
                const newGuruRef = push(gurusRef);
                
                set(newGuruRef, newGuru)
                .then(() => {
                    alert("Pendaftaran Berjaya!");
                    window.location.href = 'login-guru.html';
                })
                .catch((error) => {
                    console.error(error);
                    alert("Gagal simpan ke Cloud, tapi data disimpan secara lokal.");
                    window.location.href = 'login-guru.html';
                });
            } else {
                alert("Sila isi semua maklumat!");
            }
        };
    </script>
</body>
</html>
