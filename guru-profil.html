<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Profil Guru</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .nav-links a { color: var(--text-main); margin-left: 15px; text-decoration: none; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-top: 10px; color: var(--text-muted); font-size: 0.9rem; }
        input { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        input:disabled { background: #1e293b; color: var(--text-muted); cursor: not-allowed; }
        button.btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button.btn-success { background: var(--success); }
        button.btn:hover { opacity: 0.9; }
        button.btn:disabled { background: #475569; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="dashboard-guru.html"><i class="fas fa-arrow-left"></i> Kembali</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Profil Guru</h2>
            <div class="grid-2">
                <div>
                    <label>Nama Penuh</label>
                    <input type="text" id="pg-name">
                </div>
                <div>
                    <label>Telefon</label>
                    <input type="text" id="pg-phone">
                </div>
                <div>
                    <label>E-mel (Tidak boleh diubah)</label>
                    <input type="email" id="pg-email" disabled>
                </div>
                <div>
                    <label>ID Pengguna (UID)</label>
                    <input type="text" id="pg-uid" disabled>
                </div>
            </div>
            <p style="font-size: 0.8rem; color: var(--warning); margin-top: 10px;">
                * Sila hubungi Admin jika ingin menukar kata laluan atau e-mel.
            </p>
            <button class="btn btn-success" id="btn-save" style="margin-top: 20px;" onclick="handleUpdate()">
                <i class="fas fa-save"></i> Simpan Kemaskini
            </button>
        </div>
    </div>

    <script>
        // UI 逻辑
        window.handleUpdate = function() {
            const name = document.getElementById('pg-name').value;
            const phone = document.getElementById('pg-phone').value;

            if (!name) {
                alert("Nama tidak boleh kosong!");
                return;
            }

            document.getElementById('btn-save').disabled = true;
            document.getElementById('btn-save').innerText = "Menyimpan...";

            // 发送更新信号
            const event = new CustomEvent('updateFirebaseProfile', { 
                detail: { name, phone } 
            });
            window.dispatchEvent(event);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxZIDIPRhwXT_1aeS-dKsG2kmuUyJLUlQ",
            authDomain: "semsirakehadiran.firebaseapp.com",
            databaseURL: "https://semsirakehadiran-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "semsirakehadiran",
            storageBucket: "semsirakehadiran.firebasestorage.app",
            messagingSenderId: "68504541700",
            appId: "1:68504541700:web:26939e18ed7ae32fe57351",
            measurementId: "G-QE4862H49Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 加载数据
        document.addEventListener('DOMContentLoaded', async () => {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'login-guru.html';
                return;
            }

            const currentUser = JSON.parse(savedUser);
            
            // 填充基础数据 (来自 localStorage)
            document.getElementById('pg-name').value = currentUser.name || '';
            document.getElementById('pg-phone').value = currentUser.phone || '';
            document.getElementById('pg-email').value = currentUser.email || '';
            document.getElementById('pg-uid').value = currentUser.uid || '';

            // 尝试从云端获取最新数据进行同步
            if (currentUser.uid) {
                const userRef = ref(db, 'users/' + currentUser.uid);
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    const cloudData = snapshot.val();
                    document.getElementById('pg-name').value = cloudData.name || '';
                    document.getElementById('pg-phone').value = cloudData.phone || '';
                }
            }
        });

        // 处理更新
        window.addEventListener('updateFirebaseProfile', async (e) => {
            const { name, phone } = e.detail;
            const savedUser = JSON.parse(localStorage.getItem('currentUser'));
            const btn = document.getElementById('btn-save');

            try {
                // 1. 更新 Firebase Database
                const userRef = ref(db, 'users/' + savedUser.uid);
                await update(userRef, {
                    name: name,
                    phone: phone,
                    updatedAt: new Date().toISOString()
                });

                // 2. 更新本地缓存
                savedUser.name = name;
                savedUser.phone = phone;
                localStorage.setItem('currentUser', JSON.stringify(savedUser));

                alert('Profil berjaya dikemaskini!');
                window.location.href = 'dashboard-guru.html';

            } catch (error) {
                console.error(error);
                alert('Ralat semasa mengemaskini profil.');
                btn.disabled = false;
                btn.innerText = "Simpan Kemaskini";
            }
        });
    </script>
</body>
</html>
