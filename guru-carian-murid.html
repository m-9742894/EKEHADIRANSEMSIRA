<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Carian Murid</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --primary: #0ea5e9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        nav { background-color: var(--panel-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .nav-brand { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .nav-links a { color: var(--text-main); margin-left: 15px; text-decoration: none; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--primary); }
        button.btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .clickable-row:hover { background: rgba(14,165,233,0.1); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><i class="fas fa-microchip"></i> SEMSIRA ATTENDANCE</div>
        <div class="nav-links">
            <a href="dashboard-guru.html"><i class="fas fa-arrow-left"></i> Kembali</a>
            <button class="btn no-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3><i class="fas fa-search"></i> Carian Murid</h3>
            <div class="grid-2 no-print" style="margin-top:15px;">
                <div>
                    <label>Cari Nama / No KP:</label>
                    <input type="text" id="carian-teks" onkeyup="cariMurid()">
                </div>
                <div>
                    <label>Tapis Kelas:</label>
                    <select id="carian-kelas" onchange="cariMurid()"></select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nama Murid</th>
                        <th>No KP</th>
                        <th>Kelas</th>
                        <th class="no-print">Tindakan</th>
                    </tr>
                </thead>
                <tbody id="jadual-carian"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getDB() {
            const saved = localStorage.getItem('semsiraDB');
            return saved ? JSON.parse(saved) : { kelas: [], murid: [] };
        }

        document.addEventListener('DOMContentLoaded', function() {
            const db = getDB();
            const select = document.getElementById('carian-kelas');
            select.innerHTML = '<option value="">Semua Kelas</option>';
            db.kelas.forEach(k => {
                select.innerHTML += `<option value="${k.id}">${k.name}</option>`;
            });
            cariMurid();
        });

        function cariMurid() {
            const db = getDB();
            const teks = document.getElementById('carian-teks').value.toLowerCase();
            const kelasId = document.getElementById('carian-kelas').value;
            const tbody = document.getElementById('jadual-carian');

            let hasil = db.murid.filter(m => {
                const matchTeks = m.nama.toLowerCase().includes(teks) || m.ic.includes(teks);
                const matchKelas = kelasId === '' ? true : m.kelasId.toString() === kelasId;
                return matchTeks && matchKelas;
            });

            tbody.innerHTML = '';
            if (hasil.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Tiada rekod</td></tr>';
                return;
            }

            hasil.forEach(m => {
                const k = db.kelas.find(x => x.id === m.kelasId);
                tbody.innerHTML += `
                    <tr class="clickable-row">
                        <td>${m.nama}</td>
                        <td>${m.ic}</td>
                        <td>${k ? k.name : '-'}</td>
                        <td class="no-print">
                            <button class="btn" onclick="window.location.href='student-detail.html?id=${m.id}'">
                                <i class="fas fa-eye"></i> Profil
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
